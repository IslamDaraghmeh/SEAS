services:
  # ============================================
  # DATABASE SERVICES
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: seas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: seas_user
      POSTGRES_PASSWORD: seas_password
      POSTGRES_DB: seas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seas_user -d seas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seas-network

  redis:
    image: redis:7-alpine
    container_name: seas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seas-network

  # ============================================
  # BACKEND API (NestJS)
  # ============================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seas-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://seas_user:seas_password@postgres:5432/seas_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      IMAGE_PROCESSING_URL: http://image-processing:8000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seas-network

  # ============================================
  # IMAGE PROCESSING SERVICE (FastAPI)
  # ============================================

  image-processing:
    build:
      context: ./image-processing
      dockerfile: Dockerfile
    container_name: seas-image-processing
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
      FACE_MATCH_THRESHOLD: 0.6
      LIVENESS_THRESHOLD: 0.5
      SPOOF_THRESHOLD: 0.5
      EAR_THRESHOLD: 0.25
    volumes:
      - face_templates:/app/data/face_templates
      - processing_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - seas-network

  # ============================================
  # FRONTEND WEB (React/Vite)
  # ============================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api
        VITE_WS_URL: ws://localhost:3000
        VITE_IMAGE_PROCESSING_URL: http://localhost:8000
    container_name: seas-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - seas-network

  # ============================================
  # ADMIN TOOLS
  # ============================================

  adminer:
    image: adminer:latest
    container_name: seas-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - seas-network

networks:
  seas-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  face_templates:
  processing_logs:
