name: seas_mobile
description: Smart Exam Attendance System - Mobile App for students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # Network
  dio: ^5.4.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Localization
  intl: ^0.20.2

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0

  # Utilities
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  # NOTE: The Cairo font is supplied at runtime via the `google_fonts` package
  # (see app_theme.dart -> GoogleFonts.cairoTextTheme). The previously-declared
  # bundled `fonts:` block pointed at assets/fonts/*.ttf files that are not in
  # the repo, which broke every build. It has been removed intentionally.

flutter_intl:
  enabled: true
  main_locale: ar
  arb_dir: lib/core/localization/l10n
  output_dir: lib/core/localization/generated
