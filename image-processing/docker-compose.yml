# SEAS Image Processing Service - Docker Compose

version: '3.8'

services:
  image-processing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seas-image-processing
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=["http://localhost:3000", "http://localhost:3001", "http://localhost:5173"]
      - FACE_MATCH_THRESHOLD=0.6
      - LIVENESS_THRESHOLD=0.5
      - SPOOF_THRESHOLD=0.5
      - EAR_THRESHOLD=0.25
      - BACKEND_URL=http://host.docker.internal:3000
    volumes:
      # Mount models directory for dlib models
      - ./models:/app/models:ro
      # Mount data directory for face templates
      - ./data:/app/data
      # Mount logs directory
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - seas-network

  # Development service with hot reload
  image-processing-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seas-image-processing-dev
    ports:
      - "8001:8000"
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - .:/app
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev
    networks:
      - seas-network

networks:
  seas-network:
    driver: bridge
