services:
  # ============================================
  # DATABASE SERVICES
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: seas-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-seas_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-seas_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-seas_user} -d ${DB_NAME:-seas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seas-network
    # No ports exposed - only accessible within Docker network

  redis:
    image: redis:7-alpine
    container_name: seas-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seas-network
    # No ports exposed - only accessible within Docker network

  # ============================================
  # BACKEND API (NestJS)
  # ============================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seas-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-seas_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-seas_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: ${FRONTEND_URL}
      IMAGE_PROCESSING_URL: http://image-processing:8000
      BCRYPT_ROUNDS: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seas-network
    # No ports exposed - accessed through nginx

  # ============================================
  # IMAGE PROCESSING SERVICE (FastAPI)
  # ============================================

  image-processing:
    build:
      context: ./image-processing
      dockerfile: Dockerfile
    container_name: seas-image-processing
    restart: always
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
      FACE_MATCH_THRESHOLD: 0.6
      LIVENESS_THRESHOLD: 0.5
      SPOOF_THRESHOLD: 0.5
      EAR_THRESHOLD: 0.25
    volumes:
      - face_templates:/app/data/face_templates
      - processing_logs:/app/logs
    networks:
      - seas-network
    # No ports exposed - accessed through nginx

  # ============================================
  # NGINX REVERSE PROXY (serves frontend static files)
  # ============================================
  # NOTE: Build frontend first with: npm run build (in frontend directory)
  # The dist folder is mounted into nginx

  nginx:
    image: nginx:alpine
    container_name: seas-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - image-processing
    networks:
      - seas-network

networks:
  seas-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  face_templates:
  processing_logs:
